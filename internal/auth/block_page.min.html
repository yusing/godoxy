<!doctype html>
<html lang="en">
  <meta charset="UTF-8" /><meta
    name="viewport"
    content="width=device-width,initial-scale=1.0"
  /><title>Access Denied</title
  ><meta name="color-scheme" content="dark" /><style>
    :root {
      color-scheme: dark;
      --bg0: #070a12;
      --bg1: #0b1020;
      --card: #ffffff0e;
      --card2: #ffffff0d;
      --text: #ffffffeb;
      --muted: #ffffffad;
      --border: #ffffff1f;
      --borderSoft: #ffffff14;
      --borderStrong: #ffffff24;
      --borderHover: #ffffff38;
      --shadow: 0 22px 60px #0000008c;
      --shadowCard: 0 22px 60px #00000094;
      --shadowButton: 0 12px 28px #00000059;
      --insetHighlight: inset 0 1px 0 #ffffff0a;
      --ring: #78a0d26b;
      --accent0: #7aa3c8;
      --accent1: #9a8bc7;
      --btn: #ffffff0f;
      --btnHover: #ffffff14;
    }
    * {
      box-sizing: border-box;
    }
    html,
    body {
      height: 100%;
    }
    body {
      color: var(--text);
      background-color: var(--bg1);
      background-image: none;
      margin: 0;
      font-family:
        ui-sans-serif,
        system-ui,
        -apple-system,
        Segoe UI,
        Roboto,
        Helvetica,
        Arial,
        Apple Color Emoji,
        Segoe UI Emoji;
    }
    .wrap {
      place-items: center;
      min-height: 100%;
      padding: 28px 16px;
      display: grid;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      width: min(720px, 100%);
      box-shadow: var(--shadowCard), var(--insetHighlight);
      border-radius: 16px;
      overflow: hidden;
    }
    .topbar {
      border-bottom: 1px solid var(--borderSoft);
      background: var(--card2);
      align-items: center;
      gap: 12px;
      padding: 18px 18px 12px;
      display: flex;
    }
    .badge {
      border: 1px solid var(--borderStrong);
      background: var(--card2);
      border-radius: 12px;
      place-items: center;
      width: 38px;
      height: 38px;
      display: grid;
    }
    .badge svg {
      opacity: 0.95;
    }
    .badge .bang {
      color: #ffffffe6;
      font-size: 22px;
      font-weight: 700;
      line-height: 1;
      transform: translateY(-1px);
    }
    h1 {
      letter-spacing: 0.2px;
      margin: 0;
      font-size: 18px;
      line-height: 1.25;
    }
    .sub {
      color: var(--muted);
      margin: 2px 0 0;
      font-size: 13px;
    }
    .content {
      padding: 18px;
    }
    .error {
      color: #fffc;
      white-space: pre-wrap;
      word-break: break-word;
      text-transform: capitalize;
      background: #00000040;
      border: 1px solid #ffffff1a;
      border-radius: 12px;
      margin: 0;
      padding: 14px;
      font-family:
        ui-monospace,
        SFMono-Regular,
        Menlo,
        Monaco,
        Consolas,
        Liberation Mono,
        Courier New,
        monospace;
      font-size: 13px;
      line-height: 1.55;
    }
    .actions {
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      margin-top: 14px;
      display: flex;
    }
    a.button {
      color: #ffffffeb;
      border: 1px solid var(--borderStrong);
      background: var(--btn);
      box-shadow: var(--shadowButton);
      border-radius: 10px;
      justify-content: center;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      font-size: 14px;
      text-decoration: none;
      transition:
        transform 0.12s,
        border-color 0.12s,
        background 0.12s,
        box-shadow 0.12s;
      display: inline-flex;
    }
    a.button:hover {
      border-color: var(--borderHover);
      background: var(--btnHover);
      transform: translateY(-1px);
    }
    a.button:focus-visible {
      box-shadow:
        0 0 0 3px var(--ring),
        var(--shadowButton);
      outline: 0;
    }
    .hint {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }
    .hint kbd {
      border: 1px solid var(--borderStrong);
      background: var(--btn);
      color: #ffffffdb;
      border-radius: 6px;
      padding: 2px 4px;
      font-family:
        ui-monospace,
        SFMono-Regular,
        Menlo,
        Monaco,
        Consolas,
        Liberation Mono,
        Courier New,
        monospace;
      font-size: 11px;
    }
    kbd {
      font-weight: 500;
    }
    .kbd-container {
      align-items: center;
      gap: 2px;
      display: inline-flex;
    }
  </style>
  <div class="wrap">
    <main class="card" role="main" aria-labelledby="title">
      <header class="topbar">
        <div class="badge" aria-hidden="true"><span class="bang">!</span></div>
        <div>
          <h1 id="title">{{.StatusText}}</h1>
          <p class="sub">You don’t have permission to access this resource.</p>
        </div>
      </header>
      <section class="content">
        <pre class="error">{{.Error}}</pre>
        <div class="actions">
          <a class="button" href="{{.ActionURL}}"
            ><span>{{.ActionText}}</span><span aria-hidden="true">→</span></a
          >
          <div class="hint">
            If you just signed in, try refreshing the page.<span
              aria-hidden="true"
            ></span>
            <div class="kbd-container">
              <kbd>Ctrl</kbd><span>+</span><kbd>R</kbd>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>
</html>
