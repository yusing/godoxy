path /login {
  pass
}

!path glob("/api/v1/auth/*") &
!path glob("/auth/*") &
!path glob("/__tsr/*") &
!path regex("(?i)\\.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$") &
!path /api/v1/version &
!path /apple-icon.png &
!path /favicon.ico &
!path /icon0.svg &
!path /manifest.json &
!path /robots.txt &
!path /sw.js &
!path /registerSW.js &
!path glob("/web-app-manifest-*x*.png") {
  require_auth
}

path glob("/api/v1/*") {
  handle api
}

path glob("/auth/*") {
  rewrite /auth /api/v1/auth
  handle api
}
