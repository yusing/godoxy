[recipes.benchmark.arguments.h2]
help = "Run HTTP/2 TLS checks and benchmarks."
type = "bool"
default = true

[recipes.benchmark.arguments.h3]
help = "Run HTTP/3 checks and benchmarks."
type = "bool"
default = true

[recipes.benchmark.arguments.h1c]
help = "Run cleartext HTTP/1.1 baseline benchmarks on ports 8080..8083."
type = "bool"
default = false

[recipes.benchmark.arguments.connection_mode]
help = "Connection benchmark mode."
default = "both"
values = "@enum both reused fresh"

[recipes.benchmark.arguments.h3_tool]
help = "HTTP/3 throughput tool."
default = "auto"
values = "@enum auto h2load h3bench"

[recipes.benchmark.arguments.compose_file]
