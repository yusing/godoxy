default = "3s"
min = "0s"

[recipes.benchmark.arguments.threads]
help = "h2load worker threads."
type = "int"
default = 4
min = 1

[recipes.benchmark.arguments.connections]
help = "Concurrent reused-mode connections."
type = "int"
default = 32
min = 1

[recipes.benchmark.arguments.requests]
help = "Requests per protocol in fresh mode."
type = "int"
default = 2000
min = 1

[recipes.benchmark.arguments.fresh_connections]
help = "Concurrent fresh-mode connections; 0 uses connections."
type = "int"
default = 0
min = 0

[recipes.benchmark.arguments.streams]
help = "Concurrent streams per HTTP/2 or HTTP/3 session."
type = "int"
default = 16
min = 1

[recipes.benchmark.arguments.latency_samples]
help = "Samples per real-world latency scenario."
type = "int"
default = 5
min = 1

[recipes.benchmark.arguments.runs]
help = "Repeat each throughput benchmark and summarize."
type = "int"
default = 1
min = 1

[recipes.benchmark.arguments.repeat_delay]
help = "Delay between repeated throughput runs in seconds."
type = "int"
