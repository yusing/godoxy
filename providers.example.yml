example: # matching `example.y.z`
  scheme: https
  host: 10.0.0.1
  port: 80
  no_tls_verify: false
  middlewares:
    cidr_whitelist:
      allow:
        - 127.0.0.1
        - 10.0.0.0/8
      status_code: 403
      message: "IP not allowed"
  homepage:
    name: Example App
    icon: png/example.png
    description: An example app
    category: example

app1: # app1 -> localhost:8080
  port: 8080
app2:
  scheme: udp
  host: 10.0.0.2
  port: 2223:dns

ssh-with-proxy-protocol:
  scheme: tcp
  host: 10.0.0.3
  port: 2222:22
  relay_proxy_protocol_header: true
