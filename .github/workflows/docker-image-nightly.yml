name: Docker Image CI (nightly)

# Skip nightly image builds when branch already has PR coverage.

on:
  push:
    branches:
      - "*" # matches every branch that doesn't contain a '/'
      - "*/*" # matches every branch containing a single '/'
      - "**" # matches every branch
      - "!dependabot/*"
      - "!main" # excludes main
      - "!compat" # excludes compat branch
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      run: ${{ steps.decide.outputs.run }}
      reason: ${{ steps.decide.outputs.reason }}
    steps:
      - name: Decide whether to run image build
        id: decide
        uses: actions/github-script@v7
        with:
          script: |
            if (context.eventName === 'pull_request') {
              const pr = context.payload.pull_request;
              if (pr.head.repo.full_name !== `${context.repo.owner}/${context.repo.repo}`) {
                core.setOutput('run', 'false');
                core.setOutput('reason', 'fork_pr');
                return;
              }
              if (pr.head.ref.startsWith('dependabot/')) {
                core.setOutput('run', 'false');
                core.setOutput('reason', 'dependabot_pr');
                return;
              }
              core.info(`Skip nightly build for PR #${pr.number} on ${pr.head.ref}`);
              core.setOutput('run', 'false');
              core.setOutput('reason', `pull_request:${pr.number}`);
              return;
            }

            const branch = context.ref.replace('refs/heads/', '');
            if (branch.startsWith('dependabot/') || branch === 'main' || branch === 'compat') {
              core.setOutput('run', 'false');
              core.setOutput('reason', 'excluded_branch');
              return;
            }

            const result = await github.graphql(
              `query($owner: String!, $repo: String!, $branch: String!) {
                repository(owner: $owner, name: $repo) {
                  pullRequests(states: OPEN, headRefName: $branch, first: 50) {
                    nodes {
                      number
                      isCrossRepository
                      headRefName
                      headRepositoryOwner {
                        login
                      }
                    }
                  }
                }
              }`,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                branch,
              },
            );

            const owner = context.repo.owner.toLowerCase();
            const prs = result.repository.pullRequests.nodes.filter((pr) => (
              !pr.isCrossRepository &&
              pr.headRefName === branch &&
              pr.headRepositoryOwner?.login?.toLowerCase() === owner
            ));

            if (prs.length > 0) {
              core.info(`Skip nightly push build for ${branch}; open PRs: ${prs.map((pr) => `#${pr.number}`).join(', ')}`);
              core.setOutput('run', 'false');
              core.setOutput('reason', `open_pr:${prs.map((pr) => pr.number).join(',')}`);
              return;
            }

            core.setOutput('run', 'true');
            core.setOutput('reason', 'no_open_pr');

      - name: Report gate decision
        run: |
          echo "run=${{ steps.decide.outputs.run }}"
          echo "reason=${{ steps.decide.outputs.reason }}"

  build-nightly:
    needs: gate
    if: needs.gate.outputs.run == 'true'
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    uses: ./.github/workflows/docker-image.yml
    with:
      image_name: ${{ github.repository_owner }}/godoxy
      tag: nightly
      target: main
  build-nightly-agent:
    needs: gate
    if: needs.gate.outputs.run == 'true'
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    uses: ./.github/workflows/docker-image.yml
    with:
      image_name: ${{ github.repository_owner }}/godoxy-agent
      tag: nightly
      target: agent
