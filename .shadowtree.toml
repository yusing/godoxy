include = [
  ".shadowtree/benchmark.toml",
]

profile = "go"
shell = "sh"

shell_prelude = '''
repo_root=$(pwd)

version_value() {
	if [ -n "${VERSION:-}" ]; then
		printf '%s\n' "$VERSION"
	else
		git describe --tags --abbrev=0 2>/dev/null || true
	fi
}

configure_component() {
	component=$1
	name_override=$2
	package=${PACKAGE:-./cmd}
	build_dir=$repo_root
	is_godoxy=false

	case "$component" in
		godoxy|main|"")
			name=godoxy
			is_godoxy=true
			;;
		agent)
			name=godoxy-agent
			build_dir=$repo_root/agent
			;;
		socket-proxy)
			name=godoxy-socket-proxy
			build_dir=$repo_root/socket-proxy
			;;
		cli)
			name=godoxy-cli
			build_dir=$repo_root/cmd/cli
			package=.
			;;
		*)
			echo "unknown component: $component" >&2
			exit 2
			;;
	esac

	if [ -n "$name_override" ]; then
		name=$name_override
	fi
	bin_path=$repo_root/bin/$name
}

configure_build_mode() {
	mode=$1
	version=$(version_value)
	ldflags="-X github.com/yusing/goutils/version.version=$version -checklinkname=0"
	go_tags=
	extra_flags=
	cgo_enabled=0
	godoxy_debug=
	godoxy_trace=
	go_debug=
	go_race=

	case "$mode" in
		production|"")
			ldflags="$ldflags -s -w"
			go_tags=production
			extra_flags="-pgo=auto"
			;;
		race)
			cgo_enabled=1
			godoxy_debug=1
			go_tags=debug
			extra_flags="-race"
			;;
		debug)
			cgo_enabled=1
			godoxy_debug=1
			go_tags=debug
			;;
		trace)
			cgo_enabled=1
			godoxy_debug=1
			godoxy_trace=${GODOXY_TRACE:-1}
			go_debug="gctrace=1 inittrace=1 schedtrace=3000"
			go_tags=debug
			;;
		pprof)
			go_tags=pprof
			version=$version-pprof
			ldflags="-X github.com/yusing/goutils/version.version=$version -checklinkname=0"
			go_race="log_path=logs/pprof strip_path_prefix=$repo_root/ halt_on_error=1"
			;;
		dev)
			godoxy_debug=1
			;;
		*)
			echo "unknown build mode: $mode" >&2
			exit 2
			;;
	esac
}

ensure_webui_dist() {
	if [ "$is_godoxy" = true ] && [ ! -f "{webui_dir}/dist/client/_shell.html" ]; then
		@build-webui
	fi
}
'''

[enum_sets]
component = "@enum godoxy main agent socket-proxy cli"
build_mode = "@enum production debug race trace pprof dev"

[var_commands]
repo_root="pwd"

[vars]
repo_url="https://github.com/yusing/godoxy"
webui_dir="{repo_root}/webui"
docs_dir="{webui_dir}/wiki"

[recipes.test]
sandboxed = false
cmd = '''
configure_component godoxy ""
ensure_webui_dist
configure_build_mode production
CGO_ENABLED="$cgo_enabled" \
GODOXY_DEBUG="$godoxy_debug" \
GODOXY_TRACE="$godoxy_trace" \
GODEBUG="$go_debug" \
GORACE="$go_race" \
go test -v -tags "$go_tags" -ldflags "$ldflags" -trimpath $extra_flags {pkg}
'''

[recipes.race-test]
help = "Run tests with the race detector."
sandboxed = false
cmd = '''
configure_component godoxy ""
ensure_webui_dist
configure_build_mode race
CGO_ENABLED=1 \
GODOXY_DEBUG="$godoxy_debug" \
GODOXY_TRACE="$godoxy_trace" \
GODEBUG="$go_debug" \
GORACE="$go_race" \
go test -v -tags "$go_tags" -ldflags "$ldflags" -trimpath $extra_flags {pkg}
'''

[recipes.tcp-echo-test]
help = "Run the TCP echo integration test script."
sandboxed = false
cmd = "bun --bun scripts/tcp_echo_test.ts"

[recipes.update-go]
help = "Bump Go version in modules and Dockerfiles, then tidy project modules."
sandboxed = false
cmd = '''
go_ver=$(go version | sed -n 's/^go version go\([0-9]\+\.[0-9]\+\(\.[0-9]\+\)\?\).*/\1/p')
find . \( -name go.mod -type f -o -name Dockerfile -type f \) | while IFS= read -r file; do
	echo "updating $file"
	sed -i "s|go \([0-9]\+\.[0-9]\+\.[0-9]\+\)|go $go_ver|g" "$file"
	sed -i "s|FROM golang:.*-alpine|FROM golang:$go_ver-alpine|g" "$file"
done
@tidy
'''

[recipes.update-deps]
help = "Run go get -u and go mod tidy across project modules."
sandboxed = false
for_each = "@go-modules"
workdir = "{item}"
cmd = '''
echo "$repo_root/{item}"
go get -u ./...
'''
post = ["go mod tidy"]

[recipes.minify]
help = "Minify frontend assets for the selected component."
sandboxed = false
cmd = '''
case "{component}" in
	agent)
		echo "minify: skipped for agent"
		;;
	socket-proxy)
		echo "minify: skipped for socket-proxy"
		;;
	godoxy|main|"")
		bun --bun scripts/minify
		;;
	*)
		echo "unknown component: {component}" >&2
		exit 2
		;;
esac
'''

[recipes.minify.arguments.component]
help = "Component being built."
position = 1
default = "godoxy"
values = "@enum godoxy agent socket-proxy cli"

[recipes.build-webui]
help = "Build the embedded WebUI."
sandboxed = false
cmd = '''
@gen-rules-cheatsheet
cd "{webui_dir}"
bun i --frozen-lockfile
@gen-schema
node ./node_modules/vite/bin/vite.js build
'''

[recipes.gen-rules-cheatsheet]
help = "Regenerate the WebUI rules cheatsheet."
sandboxed = false
cmd = '''
version=$(version_value)
go run -ldflags="-X github.com/yusing/goutils/version.version=$version -checklinkname=0" ./cmd/rules-cheatsheet-gen -out "{webui_dir}/src/generated/rules-cheatsheet.json"
'''

[recipes.build]
help = "Build a GoDoxy binary."
sandboxed = false
cmd = '''
configure_component "{component}" "{name}"
ensure_webui_dist

if [ "$is_godoxy" = true ]; then
	@minify component=godoxy
elif [ "{component}" = cli ]; then
	@gen-cli
fi

configure_build_mode "{mode}"
mkdir -p "$(dirname "$bin_path")"
CGO_ENABLED="$cgo_enabled" \
GODOXY_DEBUG="$godoxy_debug" \
GODOXY_TRACE="$godoxy_trace" \
GODEBUG="$go_debug" \
GORACE="$go_race" \
go build -C "$build_dir" -tags "$go_tags" -ldflags "$ldflags" -trimpath $extra_flags -o "$bin_path" "$package"

if [ "$is_godoxy" = true ]; then
	if [ "$(id -u)" -eq 0 ]; then
		setcap CAP_NET_BIND_SERVICE=+ep "$bin_path"
	else
	  echo "Running sudo setcap CAP_NET_BIND_SERVICE=+ep "$bin_path", you'll be asked for password."
		sudo setcap CAP_NET_BIND_SERVICE=+ep "$bin_path"
	fi
fi

if [ "{docker}" = true ]; then
	mkdir -p /app
	mv "$bin_path" /app/run
fi
'''

[recipes.build.arguments.component]
help = "Binary component to build."
position = 1
default = "godoxy"
values = "@enum_set component"

[recipes.build.arguments.mode]
help = "Build mode."
default = "production"
values = "@enum_set build_mode"

[recipes.build.arguments.docker]
help = "Move the binary to /app/run for container images."
type = "bool"
default = false

[recipes.build.arguments.name]
help = "Override output binary name under bin/."
default = ""

[recipes.build-docker]
help = "Build a Docker image."
sandboxed = false
cmd = '''
docker build --build-arg="SHADOWTREE_ARGS=component={component} mode={mode}" {@} .
'''

[recipes.build-docker.arguments.component]
help = "Binary component to build."
position = 1
default = "godoxy"
values = "@enum_set component"

[recipes.build-docker.arguments.mode]
help = "Build mode."
default = "production"
values = "@enum_set build_mode"

[recipes.run-app]
help = "Run the selected component with godotenv."
sandboxed = false
cmd = '''
configure_component "{component}" ""
@minify component="{component}"
configure_build_mode "{mode}"
cd "$build_dir"
[ -f .env ] && CGO_ENABLED="$cgo_enabled" \
	GODOXY_DEBUG="$godoxy_debug" \
	GODOXY_TRACE="$godoxy_trace" \
	GODEBUG="$go_debug" \
	GORACE="$go_race" \
	godotenv -f .env go run -tags "$go_tags" -ldflags "$ldflags" -trimpath $extra_flags "$package"
'''

[recipes.run-app.arguments.component]
help = "Component to run."
position = 1
default = "godoxy"
values = "@enum_set component"

[recipes.run-app.arguments.mode]
help = "Run mode."
default = "production"
values = "@enum_set build_mode"

[recipes.dev]
help = "Build a dev binary and restart the development compose app."
sandboxed = false
pre = ["@build[component=godoxy,mode=dev]"]
cmd = '''
docker compose -f dev.compose.yml up -t 0 -d app --force-recreate
docker compose logs -f -n200 app
'''

[recipes.rapid-crash]
help = "Run a short Docker restart loop sanity check."
sandboxed = false
cmd = '''
docker run --restart=always --name test_crash -p 80 debian:bookworm-slim /bin/cat
sleep 3
docker rm -f test_crash
'''

[recipes.debug-list-containers]
help = "List Docker containers through the Docker socket with netcat and jq."
sandboxed = false
cmd = "printf 'GET /containers/json HTTP/1.0\\r\\n\\r\\n' | sudo netcat -U /var/run/docker.sock | tail -n +9 | jq"

[recipes.ci-test]
help = "Run act dry-run with a local artifact path."
sandboxed = false
cmd = '''
mkdir -p /tmp/artifacts
act -n --artifact-server-path /tmp/artifacts -s GITHUB_TOKEN="$(gh auth token)"
'''

[recipes.cloc]
help = "Count Go and WebUI source lines."
sandboxed = false
cmd = "scc -w -i go,ts,tsx --not-match '_test.go$' --not-match '.test.ts$' --not-match '.test.tsx$'"

[recipes.gen-swagger]
help = "Regenerate Swagger docs and sync api.json into the wiki."
sandboxed = false
cmd = '''
swag init --parseDependency --parseInternal --parseFuncBody -g handler.go -d internal/api -o internal/api/v1/docs
python3 scripts/fix-swagger-json.py
rm internal/api/v1/docs/docs.go
cp internal/api/v1/docs/swagger.json "{docs_dir}/public/api.json"
'''

[recipes.gen-api-types]
help = "Regenerate Swagger docs and TypeScript API client."
sandboxed = false
pre = ["@gen-swagger"]
cmd = '''
bunx --bun swagger-typescript-api generate --sort-types --generate-union-enums --add-readonly --route-types \
	--responses -o "{webui_dir}/src/lib" -n api.ts -p internal/api/v1/docs/swagger.json
'''

[recipes.gen-cli]
help = "Regenerate the CLI from cmd/cli/gen."
sandboxed = false
cmd = "@run cwd=cmd/cli ./gen"

[recipes.update-wiki]
help = "Regenerate wiki content from package docs."
sandboxed = false
cmd = "bun --bun scripts/update-wiki"

[recipes.update-wiki.env]
DOCS_DIR="{docs_dir}"
REPO_URL="{repo_url}"

[recipes.gen-schema]
help = "Generate WebUI config schemas."
sandboxed = false
cmd = "@webui:gen-schema"

[recipes.deadcode]
help = "Scan for deadcode"
for_each = "@go-main-packages"
workdir = "{item}"
cmd = "deadcode ./..."
